name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy pytest
    
    - name: Run Black
      run: black --check src/ tests/ scripts/ demo/
    
    - name: Run Ruff
      run: ruff check src/ tests/ scripts/ demo/
    
    - name: Run MyPy
      run: mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests
      run: pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  simulation-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run basic simulation test
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from controllers import PIDForceController
        from simulation import RobotSimulation, SimulationConfig, RobotConfig
        from utils import set_random_seed
        
        # Set seed for reproducibility
        set_random_seed(42)
        
        # Create controller
        controller = PIDForceController(desired_force=5.0, kp=0.1, ki=0.05, kd=0.01)
        
        # Configure simulation (no GUI for CI)
        sim_config = SimulationConfig(enable_gui=False, enable_realtime=False)
        robot_config = RobotConfig(urdf_path='robots/urdf/simple_arm.urdf')
        
        # Run short simulation
        with RobotSimulation(sim_config, robot_config) as sim:
            results = sim.run_force_control(controller, duration=1.0)
        
        print('Simulation completed successfully!')
        print(f'Simulation steps: {len(results[\"time\"])}')
        "

  build-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Generate documentation
      run: |
        # Create basic documentation
        mkdir -p docs
        echo "# Force Control for Robots" > docs/README.md
        echo "" >> docs/README.md
        echo "This is the documentation for the Force Control for Robots project." >> docs/README.md
        echo "" >> docs/README.md
        echo "## Installation" >> docs/README.md
        echo "" >> docs/README.md
        echo "pip install -e ." >> docs/README.md
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Run safety check
      run: safety check
    
    - name: Run bandit security scan
      run: bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-results
        path: bandit-report.json
